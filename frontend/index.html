<!DOCTYPE html>
<html>
<head>
  <title>RMS</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f2f5;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 300px;
    }

    h2 {
      margin: 0 0 24px;
      font-size: 22px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
    }

    input:focus {
      border-color: #4a90e2;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login</h2>
  <input id="id" placeholder="User ID">
  <input id="pin" placeholder="PIN" type="password">
  <button onclick="login()">Login</button>
</div>

<h2>Sales List</h2>

<div id="sales"></div>

<button onclick="loadSales()">Load Sales</button>

<script>
function login() {
  fetch("http://127.0.0.1:5000/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      id: document.getElementById("id").value,
      pin: document.getElementById("pin").value
    })
  })
  .then(res => res.json())
  .then(data => alert(data.message));
}
</script>

</body>
</html>
